worker_processes auto;

events {
    use epoll;
    worker_connections 65535;
    multi_accept on;
}

http {
    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 100000;

    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ =404;
        }
    }
}
