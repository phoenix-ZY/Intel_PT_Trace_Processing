global
    maxconn 65535
    hard-stop-after 5m
    tune.ssl.default-dh-param 2048
    tune.ssl.cachesize 100000

defaults
    mode http
    maxconn 65535
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    option http-keep-alive

frontend http-in
    bind *:9000
    default_backend nginx_servers

backend nginx_servers
    server s1 172.30.0.11:80 check inter 10s
